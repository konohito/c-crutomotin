name: Deploy OCR backend (Firebase Functions)

# バックエンド(functions / Firestore・Storage ルール)を main へのマージで自動デプロイする。
# フロントの Pages デプロイ(deploy.yml)とは独立。functions 配下やルールの変更時のみ走る。
#
# 事前準備(未設定の間はデプロイ手順をスキップするだけで、ジョブは失敗しない):
#   1. リポジトリ Variables に FIREBASE_PROJECT_ID を設定(GCP/Firebase プロジェクト ID)
#   2. リポジトリ Secrets に FIREBASE_SERVICE_ACCOUNT を設定
#      (デプロイ権限を持つサービスアカウントの JSON 鍵。Firebase Admin / Cloud Functions 管理者 等)
#   詳細は docs/OCR-BACKEND.md「GitHub Actions によるバックエンド自動デプロイ」を参照。

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Workload Identity Federation(鍵レス認証)に必要

concurrency:
  group: deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 認証は Workload Identity Federation(鍵レス)。組織ポリシーで SA 鍵作成が
      # 禁止されていても使える。旧方式(FIREBASE_SERVICE_ACCOUNT 鍵)も後方互換で残す。
      - id: guard
        env:
          WIF: ${{ vars.GCP_WIF_PROVIDER }}
          WSA: ${{ vars.GCP_DEPLOY_SA }}
          KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$PID" ] && { { [ -n "$WIF" ] && [ -n "$WSA" ]; } || [ -n "$KEY" ]; }; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            if [ -n "$WIF" ] && [ -n "$WSA" ]; then echo "mode=wif" >> "$GITHUB_OUTPUT"; else echo "mode=key" >> "$GITHUB_OUTPUT"; fi
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=バックエンド未設定::GCP_WIF_PROVIDER+GCP_DEPLOY_SA(または FIREBASE_SERVICE_ACCOUNT)と FIREBASE_PROJECT_ID が未設定のためスキップしました（docs/OCR-BACKEND.md 参照）。"
          fi

      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      # 依存インストール＋テスト(単体のみ。E2E はエミュレータが要るため CI では実行しない)
      - if: steps.guard.outputs.ready == 'true'
        working-directory: functions
        run: |
          npm ci
          npm test

      # functions/.env は gitignore のため、ランタイム環境変数を Variables から生成する
      # (DOCAI_PROCESSOR_ID はリポジトリ Variables に設定。未設定なら OCR はエラーを返すだけで安全)
      - if: steps.guard.outputs.ready == 'true'
        working-directory: functions
        run: |
          {
            echo "DOCAI_LOCATION=${{ vars.DOCAI_LOCATION || 'us' }}"
            echo "DOCAI_PROCESSOR_ID=${{ vars.DOCAI_PROCESSOR_ID }}"
            echo "OCR_ALLOW_ORIGIN=${{ vars.OCR_ALLOW_ORIGIN || 'https://cruto-motion.web.app' }}"
          } > .env

      # GCP 認証: WIF(鍵レス・推奨) または SA 鍵(後方互換)
      - if: steps.guard.outputs.ready == 'true' && steps.guard.outputs.mode == 'wif'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
      - if: steps.guard.outputs.ready == 'true' && steps.guard.outputs.mode == 'key'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # functions + Firestore/Storage ルール・インデックスをデプロイ
      - if: steps.guard.outputs.ready == 'true'
        working-directory: functions
        run: >-
          npx firebase-tools deploy
          --only functions,firestore:rules,firestore:indexes,storage
          --project "${{ vars.FIREBASE_PROJECT_ID }}"
          --non-interactive
