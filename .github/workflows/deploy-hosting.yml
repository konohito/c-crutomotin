name: Deploy production app (Firebase Hosting)

# 本番アプリ（Hosting のみ）を手動でデプロイする予備の窓口。
# 通常のデプロイは deploy-production.yml(main / production への push で本番一式)が担うため、
# こちらは workflow_dispatch(Actions 画面の Run workflow)専用にしてある。
# ※SA 鍵(FIREBASE_SERVICE_ACCOUNT)前提の旧方式。組織ポリシーで鍵作成が禁止のため
#   現在は guard でスキップされる。WIF 対応の deploy-production.yml を使うこと。

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: guard
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$SA" ] && [ -n "$PID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=本番未設定::FIREBASE_SERVICE_ACCOUNT / FIREBASE_PROJECT_ID 未設定のため Hosting デプロイをスキップ（docs/実データ取り込み.md 参照）。"
          fi

      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - if: steps.guard.outputs.ready == 'true'
        run: npm ci

      # 本番ビルド（base=/、VITE_FIREBASE_CONFIG は .env.hosting から）
      - if: steps.guard.outputs.ready == 'true'
        run: npm run build:hosting

      - if: steps.guard.outputs.ready == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - if: steps.guard.outputs.ready == 'true'
        run: npx firebase-tools deploy --only hosting --project "${{ vars.FIREBASE_PROJECT_ID }}" --non-interactive
