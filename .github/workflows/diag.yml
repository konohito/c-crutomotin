name: Diagnose OCR pipeline

# 一時的な診断用。diag/ocr-check ブランチへの push で本番の OCR パイプラインの状態
# （Firestore キュー・Storage・関数ログ・インデックス）を確認する。原因判明後に削除する。
# 個人情報は出力しない（functions/scripts/diag-ocr.cjs 参照）。

on:
  push:
    branches: [diag/ocr-check]

permissions:
  contents: read
  id-token: write

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - working-directory: functions
        run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      # 権限修正(datastore.user 付与)後の検証: 既存画像をコピーして関数を再発火させる
      - name: 既存画像をコピーして再処理をトリガー
        run: |
          SRC="gs://cruto-motion.firebasestorage.app/sheets/20260724-z7gub/1-1784874135336-KH.jpg"
          gcloud storage cp "$SRC" "gs://cruto-motion.firebasestorage.app/sheets/20260724-z7gub/9-retrigger.jpg" \
            && echo "COPY OK" || echo "COPY FAILED"
          sleep 60

      - name: キューに載ったか確認
        working-directory: functions
        env:
          GCLOUD_PROJECT: ${{ vars.FIREBASE_PROJECT_ID }}
        run: node scripts/diag-ocr.cjs

      - name: 直近の関数ログ (10分)
        run: >-
          gcloud logging read
          'resource.type="cloud_run_revision" AND resource.labels.service_name="onsheetimageupload"'
          --project "${{ vars.FIREBASE_PROJECT_ID }}"
          --freshness=10m --limit=30 --order=desc
          --format='value(timestamp,severity,textPayload)'
          || echo "LOGS FAILED"
